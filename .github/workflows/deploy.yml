name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: communityai-production
  REGION: us-central1
  REPO_NAME: communityai-repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: \${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker push
        run: gcloud auth configure-docker \${{ env.REGION }}-docker.pkg.dev

      # -----------------
      # BUILD & PUSH BACKEND
      # -----------------
      - name: Build Backend Image
        run: docker build -t \${{ env.REGION }}-docker.pkg.dev/\${{ env.PROJECT_ID }}/\${{ env.REPO_NAME }}/backend:\${{ github.sha }} ./backend

      - name: Push Backend Image
        run: docker push \${{ env.REGION }}-docker.pkg.dev/\${{ env.PROJECT_ID }}/\${{ env.REPO_NAME }}/backend:\${{ github.sha }}

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy communityai-backend \
            --image \${{ env.REGION }}-docker.pkg.dev/\${{ env.PROJECT_ID }}/\${{ env.REPO_NAME }}/backend:\${{ github.sha }} \
            --region \${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated

      # -----------------
      # BUILD & PUSH FRONTEND
      # -----------------
      - name: Build Frontend Image
        run: docker build -t \${{ env.REGION }}-docker.pkg.dev/\${{ env.PROJECT_ID }}/\${{ env.REPO_NAME }}/frontend:\${{ github.sha }} ./frontend

      - name: Push Frontend Image
        run: docker push \${{ env.REGION }}-docker.pkg.dev/\${{ env.PROJECT_ID }}/\${{ env.REPO_NAME }}/frontend:\${{ github.sha }}

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy communityai-frontend \
            --image \${{ env.REGION }}-docker.pkg.dev/\${{ env.PROJECT_ID }}/\${{ env.REPO_NAME }}/frontend:\${{ github.sha }} \
            --region \${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated
